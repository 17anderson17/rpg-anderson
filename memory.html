<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória com Dr Anderson Politi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #f5e6d3;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #2c3e50;
            min-width: 100px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            aspect-ratio: 1;
            background: white;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            cursor: pointer;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .card:hover:not(.matched):not(.flipped) {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .card.flipped {
            background: #e8d5c4;
            border-color: #e67e22;
        }

        .card.matched {
            background: #d4edda;
            border-color: #28a745;
            cursor: default;
            animation: matchPulse 0.5s ease-out;
        }

        @keyframes matchPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .card:active:not(.matched) {
            transform: scale(0.95);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(44, 62, 80, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #2c3e50;
            border: 2px solid #2c3e50;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            border: 4px solid #2c3e50;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .big-emoji {
            font-size: 60px;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 2px solid #2c3e50;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e67e22 0%, #d35400 100%);
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .card {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>❤️ JOGO DA MEMÓRIA</h1>
        <p>COM DR ANDERSON POLITI</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">PONTOS</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">PARES</div>
            <div class="stat-value"><span id="matched">0</span>/6</div>
        </div>
        <div class="stat">
            <div class="stat-label">MOVIMENTOS</div>
            <div class="stat-value" id="moves">0</div>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button class="btn-primary" onclick="newGame()">🔄 Novo Jogo</button>
        <button class="btn-secondary" onclick="resetGame()">↺ Reiniciar</button>
    </div>
</div>

<!-- Modal de Vitória -->
<div class="modal" id="winModal">
    <div class="modal-content">
        <div class="big-emoji">🎉</div>
        <h2>Parabéns!</h2>
        <p>Você conseguiu emparelar todos os hábitos saudáveis!</p>
        <p style="font-size: 20px; color: #2c3e50; font-weight: bold;" id="finalScore">0 Pontos</p>
        <button class="btn-primary" onclick="newGame()" style="width: 100%; margin-top: 20px;">Jogar Novamente</button>
    </div>
</div>

<script>
    // Dados do jogo - Pares de ícones
    const cardPairs = [
        { emoji: '❤️', pair: '🏃' },  // Coração - Exercício
        { emoji: '🥗', pair: '💪' },  // Comida - Força
        { emoji: '😴', pair: '⚡' },  // Sono - Energia
        { emoji: '🚭', pair: '🫁' },  // Sem fumar - Pulmão
        { emoji: '🧘', pair: '😊' },  // Meditação - Felicidade
        { emoji: '🍎', pair: '🩺' }   // Maçã - Saúde
    ];

    let cards = [];
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let score = 0;
    let locked = false;

    function initGame() {
        cards = [];
        cardPairs.forEach(pair => {
            cards.push({ emoji: pair.emoji, pair: pair.pair, matched: false });
            cards.push({ emoji: pair.pair, pair: pair.emoji, matched: false });
        });
        cards = cards.sort(() => Math.random() - 0.5);
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('gameBoard');
        board.innerHTML = '';

        cards.forEach((card, index) => {
            const cardEl = document.createElement('button');
            cardEl.className = 'card';
            if (card.matched) {
                cardEl.classList.add('matched');
                cardEl.textContent = card.emoji;
            } else {
                cardEl.textContent = '?';
            }
            cardEl.onclick = () => flipCard(index);
            board.appendChild(cardEl);
        });
    }

    function flipCard(index) {
        if (locked || cards[index].matched || flipped.includes(index)) return;

        flipped.push(index);
        const cardEls = document.querySelectorAll('.card');
        cardEls[index].classList.add('flipped');
        cardEls[index].textContent = cards[index].emoji;

        if (flipped.length === 2) {
            moves++;
            checkMatch();
        }

        updateStats();
    }

    function checkMatch() {
        locked = true;
        const [first, second] = flipped;
        const isMatch = cards[first].pair === cards[second].emoji;

        setTimeout(() => {
            const cardEls = document.querySelectorAll('.card');

            if (isMatch) {
                cards[first].matched = true;
                cards[second].matched = true;
                matched++;
                score += 10;

                cardEls[first].classList.add('matched');
                cardEls[second].classList.add('matched');

                if (matched === 6) {
                    endGame();
                }
            } else {
                score = Math.max(0, score - 2);
                cardEls[first].classList.remove('flipped');
                cardEls[second].classList.remove('flipped');
                cardEls[first].textContent = '?';
                cardEls[second].textContent = '?';
            }

            flipped = [];
            locked = false;
            updateStats();
        }, 1000);
    }

    function updateStats() {
        document.getElementById('score').textContent = score;
        document.getElementById('matched').textContent = matched;
        document.getElementById('moves').textContent = moves;

        const progress = (matched / 6) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
    }

    function endGame() {
        setTimeout(() => {
            document.getElementById('finalScore').textContent = score + ' Pontos';
            document.getElementById('winModal').classList.add('show');
        }, 500);
    }

    function newGame() {
        document.getElementById('winModal').classList.remove('show');
        matched = 0;
        moves = 0;
        score = 0;
        flipped = [];
        locked = false;
        initGame();
        updateStats();
    }

    function resetGame() {
        matched = 0;
        moves = 0;
        score = 0;
        flipped = [];
        locked = false;
        initGame();
        updateStats();
    }

    // Iniciar
    initGame();
    updateStats();
</script>

</body>
</html>
